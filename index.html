<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A96E;--gold-light:#E8D5B0;
  --dark:#1A1410;--dark2:#2C2318;
  --cream:#F7F2EA;--cream2:#EDE5D8;
  --text:#3A2E22;--muted:#8A7A6A;
  --radius:2px;
}
html{scroll-behavior:smooth}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;align-items:center}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 10% 20%,rgba(201,169,110,.08) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 90% 80%,rgba(201,169,110,.06) 0%,transparent 60%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:2rem 1.5rem 4rem;min-height:100vh;width:100%}

.brand{text-align:center;padding:2.5rem 0 3rem}
.brand img{height:40px;width:auto;mix-blend-mode:multiply}
.brand-sub{font-size:.68rem;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;margin-top:.7rem}
.brand-line{width:50px;height:1px;background:var(--gold);margin:1.1rem auto 0;opacity:.5}

.progress-wrap{margin-bottom:2.5rem}
.progress-label{display:flex;justify-content:space-between;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
.progress-track{height:1px;background:var(--cream2);position:relative;overflow:hidden}
.progress-fill{position:absolute;left:0;top:0;bottom:0;background:var(--gold);transition:width .5s cubic-bezier(.4,0,.2,1)}

.screen{display:none;animation:fadeUp .45s ease both}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.intro-eyebrow{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem}
.intro-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,6vw,3.2rem);font-weight:300;line-height:1.2;color:var(--dark);margin-bottom:1.5rem}
.intro-title em{font-style:italic;color:var(--gold)}
.intro-body{font-size:.92rem;line-height:1.85;color:var(--muted);max-width:480px;margin-bottom:2.8rem}
.intro-meta{display:flex;gap:2rem;margin-bottom:3rem}
.meta-item{display:flex;flex-direction:column;gap:.2rem}
.meta-num{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:var(--gold);line-height:1}
.meta-label{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.intro-divider{width:100%;height:1px;background:var(--cream2);margin-bottom:3rem}

.btn-primary{display:inline-flex;align-items:center;gap:.8rem;background:var(--dark);color:var(--gold-light);font-family:'Jost',sans-serif;font-size:.75rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;padding:1.1rem 2.4rem;border:none;cursor:pointer;border-radius:var(--radius);transition:background .2s,transform .15s;text-decoration:none}
.btn-primary:hover{background:var(--dark2);transform:translateY(-1px)}
.btn-ghost{display:inline-flex;align-items:center;gap:.6rem;background:none;border:1px solid var(--cream2);color:var(--muted);font-family:'Jost',sans-serif;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;padding:.8rem 1.6rem;cursor:pointer;border-radius:var(--radius);transition:border-color .2s,color .2s}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-back{display:inline-flex;align-items:center;gap:.5rem;background:none;border:none;color:var(--muted);font-family:'Jost',sans-serif;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;padding:0;transition:color .2s}
.btn-back:hover{color:var(--gold)}

.q-eyebrow{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.8rem}
.q-text{font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,5vw,2.2rem);font-weight:300;color:var(--dark);line-height:1.3;margin-bottom:2.2rem}
.q-options{display:flex;flex-direction:column;gap:.75rem;margin-bottom:2.5rem}
.option{display:flex;align-items:center;gap:1.2rem;padding:1.1rem 1.4rem;border:1px solid var(--cream2);background:white;cursor:pointer;border-radius:var(--radius);transition:border-color .2s,background .2s,transform .15s;text-align:left;font-family:'Jost',sans-serif;width:100%}
.option:hover{border-color:var(--gold);background:#FFFCF8;transform:translateX(4px)}
.option.selected{border-color:var(--gold);background:#FBF6EE}
.option.selected .opt-dot{background:var(--gold)}
.opt-dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--gold);flex-shrink:0;transition:background .2s}
.opt-icon{font-size:1.3rem;flex-shrink:0}
.opt-text{display:flex;flex-direction:column;gap:.15rem}
.opt-label{font-size:.9rem;font-weight:400;color:var(--text);line-height:1.3}
.opt-sub{font-size:.75rem;color:var(--muted);font-style:italic}
.q-nav{display:flex;align-items:center;justify-content:space-between}
.btn-next{display:inline-flex;align-items:center;gap:.7rem;background:var(--dark);color:var(--gold-light);font-family:'Jost',sans-serif;font-size:.72rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;padding:.95rem 2rem;border:none;cursor:pointer;border-radius:var(--radius);transition:all .2s;opacity:.3;pointer-events:none}
.btn-next.ready{opacity:1;pointer-events:all}
.btn-next.ready:hover{background:var(--dark2);transform:translateY(-1px)}

.result-header{text-align:center;margin-bottom:2.5rem}
.result-eyebrow{font-size:.68rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:.8rem}
.result-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,6vw,3rem);font-weight:300;color:var(--dark);line-height:1.1;margin-bottom:.4rem}
.result-title em{font-style:italic;color:var(--gold)}
.result-subtitle{font-size:.8rem;color:var(--muted);letter-spacing:.06em}
.result-card{background:white;border:1px solid var(--cream2);border-radius:var(--radius);overflow:hidden;margin-bottom:2rem}
.result-img-wrap{width:100%;height:300px;background:linear-gradient(135deg,var(--cream) 0%,var(--cream2) 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.result-img-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(201,169,110,.12) 0%,transparent 70%)}
.result-img{max-height:240px;max-width:75%;object-fit:contain;position:relative;z-index:1;filter:drop-shadow(0 8px 28px rgba(0,0,0,.14))}
.result-img-fallback{font-size:4rem;display:flex;align-items:center;justify-content:center;width:100%;height:100%;position:relative;z-index:1}
.result-body{padding:2rem 2rem 2.5rem}
.result-tags{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.2rem}
.tag{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;padding:.3rem .8rem;border:1px solid var(--gold);color:var(--gold);border-radius:99px}
.tag.dark{background:var(--dark);border-color:var(--dark);color:var(--gold-light)}
.result-name{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;color:var(--dark);margin-bottom:.25rem;line-height:1}
.result-inspired{font-size:.78rem;color:var(--muted);letter-spacing:.08em;margin-bottom:1.5rem}
.result-divider{height:1px;background:var(--cream2);margin-bottom:1.5rem}
.result-notes-title{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
.result-desc{font-size:.9rem;line-height:1.85;color:var(--text);margin-bottom:1.8rem;white-space:pre-line}
.result-price{display:flex;align-items:baseline;gap:.5rem;margin-bottom:1.8rem;flex-wrap:wrap}
.price-label{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.price-val{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;color:var(--dark)}
.price-alt{font-size:.85rem;color:var(--muted)}
.btn-buy{display:flex;align-items:center;justify-content:center;gap:.8rem;background:var(--dark);color:var(--gold-light);font-family:'Jost',sans-serif;font-size:.75rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;padding:1.2rem 2rem;border:none;cursor:pointer;border-radius:var(--radius);text-decoration:none;transition:background .2s,transform .15s;width:100%}
.btn-buy:hover{background:var(--dark2);transform:translateY(-1px)}
.result-restart{text-align:center;padding-top:1rem}

.footer-note{text-align:center;margin-top:3rem;font-size:.7rem;color:var(--muted);letter-spacing:.08em}
.footer-note a{color:var(--gold);text-decoration:none}

@media(max-width:480px){
  #app{padding:1.5rem 1rem 3rem}
  .intro-meta{gap:1.2rem}
  .result-body{padding:1.5rem 1.5rem 2rem}
  .result-img-wrap{height:240px}
}
</style>

let current = 0, answers = {};

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(id);
  el.classList.add('active');
  el.style.animation='none'; el.offsetHeight; el.style.animation='';
}

function startQuiz(){
  current=0; answers={};
  show('screen-quiz');
  renderQ();
}

function prevQ(){
  if(current===0){show('screen-intro');return;}
  current--; renderQ();
}

function nextQ(){
  const q=questions[current];
  if(!answers[q.key]) return;
  if(current<questions.length-1){current++;renderQ();}
  else showResult();
}

function renderQ(){
  const q=questions[current], total=questions.length;
  const pct=Math.round((current/total)*100);
  document.getElementById('prog-text').textContent=`Pergunta ${current+1} de ${total}`;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('q-eyebrow').textContent=q.eyebrow;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('btn-back').style.visibility=current===0?'hidden':'visible';
  document.getElementById('next-label').textContent=current===total-1?'Ver resultado':'Próxima';
  const container=document.getElementById('q-options');
  container.innerHTML='';
  const saved=answers[q.key];
  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option'+(saved&&saved.idx===i?' selected':'');
    btn.innerHTML=`<span class="opt-dot"></span><span class="opt-icon">${opt.icon}</span><span class="opt-text"><span class="opt-label">${opt.label}</span>${opt.sub?`<span class="opt-sub">${opt.sub}</span>`:'' }</span>`;
    btn.onclick=()=>selectOpt(i,opt,q.key);
    container.appendChild(btn);
  });
  updateNextBtn();
}

function selectOpt(idx,opt,key){
  answers[key]={idx,value:opt.value,tags:opt.tags||[]};
  document.querySelectorAll('.option').forEach((b,i)=>b.className='option'+(i===idx?' selected':''));
  updateNextBtn();
}

function updateNextBtn(){
  const ready=!!answers[questions[current].key];
  document.getElementById('btn-next').classList.toggle('ready',ready);
}

function showResult(){
  const generoVal=(answers['genero']&&answers['genero'].value)||'all';
  let candidatos=perfumes.filter(p=>generoVal==='all'||p.genero===generoVal||p.genero==='all');
  const allTags=[];
  Object.entries(answers).forEach(([k,r])=>{if(k!=='genero'&&r.tags)r.tags.forEach(t=>allTags.push(t));});
  const scored=candidatos.map(p=>{
    let score=0; allTags.forEach(t=>{if(p.tags.includes(t))score++;});
    return{...p,score};
  }).sort((a,b)=>b.score-a.score);
  const w=scored[0];
  const generoTag=w.genero==='him'?'For Him':w.genero==='her'?'For Her':'For All';
  const precoHtml=w.p60
    ?`<div class="result-price"><span class="price-label">A partir de</span><span class="price-val">R$ ${w.p100}</span><span class="price-alt">&nbsp;· ou R$ ${w.p60} em 60ml</span></div>`
    :`<div class="result-price"><span class="price-label">A partir de</span><span class="price-val">R$ ${w.p100}</span></div>`;

  document.getElementById('screen-result').innerHTML=`
    <div class="result-header">
      <div class="result-eyebrow">Sua fragrância ideal</div>
      <h2 class="result-title"><em>${w.nome}</em></h2>
      <p class="result-subtitle">Inspirado em ${w.inspirado}</p>
    </div>
    <div class="result-card">
      <div class="result-img-wrap">
        ${w.img
          ? `<img class="result-img" src="${w.img}" alt="${w.nome}" onerror="this.style.display='none';this.parentElement.querySelector('.result-img-fallback').style.display='flex'">`
          : ''
        }
        <div class="result-img-fallback" style="display:${w.img?'none':'flex'}">🌸</div>
      </div>
      <div class="result-body">
        <div class="result-tags">
          <span class="tag dark">${generoTag}</span>
          <span class="tag">${w.familia}</span>
        </div>
        <div class="result-name">${w.nome}</div>
        <div class="result-inspired">Inspirado em ${w.inspirado}</div>
        <div class="result-divider"></div>
        <div class="result-notes-title">Notas &amp; Ocasião</div>
        <div class="result-desc">${w.desc}</div>
        ${precoHtml}
        <a class="btn-buy" href="${w.link}" target="_blank">
          Ver produto &amp; comprar
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      </div>
    </div>
    <div class="result-restart">
      <button class="btn-ghost" onclick="startQuiz()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13.5 2.5v4h-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.5 6.5A6 6 0 1 1 10 2.08" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Refazer o quiz
      </button>
    </div>`;
  show('screen-result');
}
</script>
